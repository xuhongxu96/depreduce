readonly_deps_attrs = ["exports"]

[[from.filters]]
type = "Rule"
allow.rule_classes = ['ng_project', 'ts_project']
block.target_names = []
scope = "Remove"

[[from.filters]]
type = "FunctionCall"
func = "select"
keys = ["deps", "defines", "srcs"]
scope = "Remove"

[[from.filters]]
type = "Alias"
scope = "Remove"

[[from.filters]]
type = "AttrRule"
attrs = ['srcs']
rules = ['regex:\.mts$', 'regex:\.mjs$', 'regex:_spec\.ts$']
scope = "Remove"

[[to.filters]]
type = "Rule"
block.rule_classes = ['regex:_import$', 'sass_library']
block.target_names = [
    '//:node_modules/@types',
    "//bazel/spec-bundling/test:transitive_should_be_loaded",
]
scope = "Remove"

[[to.filters]]
type = "AttrRule"
attrs = ['srcs']
rules = [
    'regex:\.d\.ts$',
    'regex:\.api\.ts$',
    'regex:\.extensions\.ts$',
    'regex:\.init\.ts$',
    'regex:\.mts$',
    'regex:\.mjs$',
]
scope = "Remove"

[[to.filters]]
type = "FunctionCall"
func = "select"
keys = ["deps", "defines", "srcs"]
scope = "Remove"

[[to.filters]]
type = "Alias"
scope = "Remove"
