[[from.filters]]
type = "Rule"
allow.rule_classes = ['cc_library']
block.target_names = [
    'regex:^//third_party',
    'regex:^//tensorflow/lite',
    'regex:^//tensorflow/compiler',
    'regex:^//tensorflow/python',
    'regex:^//tensorflow/java',
]

[[from.filters]]
type = "FunctionCall"
func = "select"
keys = ["deps", "defines"]
scope = "Remove"

[[from.filters]]
type = "Alias"
scope = "Remove"

[[to.filters]]
type = "Rule"
block.rule_classes = ['regex:_import$']
scope = "Remove"

[[to.filters]]
type = "FunctionCall"
func = "select"
keys = ["deps", "defines"]
scope = "Remove"
