readonly_deps_attrs = ["exports", "jars"]
timeout_seconds = 600

[[from.filters]]
type = "Rule"
block.rule_classes = [
    'regex:^javadoc_',
    'regex:_import$',
    'regex:^py_',
    'regex:^js_',
    'rollup_bundle',
]
block.target_names = [
    'regex:^//plugins',
    '//java/com/google/gerrit/util/cli:protogen',
    '//javatests/com/google/gerrit/entities/converter:proto_converter_tests',
]
scope = "Remove"

[[from.filters]]
type = "FunctionCall"
func = "select"
keys = ["deps", "defines", "srcs"]
scope = "Remove"

[[from.filters]]
type = "Alias"
scope = "Remove"

[[to.filters]]
type = "Rule"
block.rule_classes = ['regex:_import$']
scope = "Remove"

[[to.filters]]
type = "FunctionCall"
func = "select"
keys = ["deps", "defines", "srcs"]
scope = "Remove"

[[to.filters]]
type = "Alias"
scope = "Remove"
