name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: LFS
      run: git lfs pull
    
    - name: Setup Bazel
      uses: abhinavsingh/setup-bazel@v3
      with:
        version: 8.3.1

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2.8.0
          
    - name: Build
      run: cargo build -r --verbose

    - name: Run tests
      run: cargo test -r --verbose
